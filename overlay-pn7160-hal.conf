# PN7160 + NFC HAL scaffold only (no reader engine)
#
# Requires a PN7160 devicetree node — pair with a board overlay, e.g.:
#   west build -b nrf54l15dk/nrf54l15/cpuapp . \
#     -DEXTRA_CONF_FILE=overlay-pn7160-hal.conf
# (sysbuild.cmake defaults writable_ndef_msg_DTC_OVERLAY_FILE to pn7160_i2c.overlay)
#
# NFC_PROFILE_LAB pulls in HAL + role compile paths but no reader/store/applets.
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_DBG=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160_SHELL=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_ROLE_READER=y
CONFIG_NFC_PROFILE_LAB=y
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
# Reader engine added via overlay-pn7160-stack.conf (NFC_PROFILE_READER).
# CONFIG_NFC_READER is not set
