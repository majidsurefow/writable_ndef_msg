name: Build with Clang/LLVM

# Disabled as a PR gate (LLVM SDK setup is unreliable here; nfc-pn7160 has no clang job).
# Keep file for manual runs.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_PATH: .

jobs:
  clang-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          clean: false

      - name: Setup Zephyr (cached)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "true"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Run Twister (ci_build)
        run: |
          west twister -T . -t ci_build --build-only \
            --force-color --inline-logs -v --clobber-output -j $(nproc)
