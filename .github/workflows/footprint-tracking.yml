name: Footprint Tracking

on:
  schedule:
    - cron: '50 0 * * 0'
  push:
    branches:
      - main
      - nfc-stack
      - v*-branch
    paths:
      - 'sample.yaml'
      - 'modules/**'
      - 'src/**'
      - 'boards/**'
      - 'prj.conf'
      - 'overlay*.conf'
      - '.github/workflows/footprint-tracking.yml'
      - '.github/actions/setup-zephyr/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  footprint-tracking:
    name: Record footprint
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          clean: false

      - name: Setup Zephyr (cached)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "true"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Twister build (ci_build integration)
        run: |
          west twister -T . -t ci_build --integration --build-only \
            --force-color --inline-logs -v --clobber-output -j $(nproc)

      - name: Collect footprint report
        run: python3 scripts/ci/footprint_report.py twister-out -o footprint.json

      - name: Upload footprint data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: footprint-${{ github.ref_name }}-${{ github.run_id }}
          path: footprint.json

      - name: Summarize footprint
        run: |
          echo "## Footprint report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat footprint.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
