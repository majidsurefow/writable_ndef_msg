name: NCS-CI · Guidelines

run-name: "NCS-CI · Guidelines · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}"

on:
  pull_request:
    types:
      - edited
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

env:
  COMPLIANCE_PATHS: >-
    src modules boards docs sample.yaml west.yml CMakeLists.txt Kconfig prj.conf
    overlay-pn7160.conf overlay-pn7160-spi.conf

jobs:
  coding_guidelines:
    runs-on: ubuntu-24.04
    name: NCS-CI · Guidelines
    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          clean: false

      - name: Rebase onto the target branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Setup Zephyr (cached, no toolchain)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "false"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Install coccinelle
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends coccinelle

      - name: Run Coding Guidelines Checks
        continue-on-error: true
        id: coding_guidelines
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only origin/${BASE_REF}.. -- ${COMPLIANCE_PATHS} || true)
          if [ -z "$changed" ]; then
            echo "No product-path changes; skipping coding guidelines."
            : > output.txt
            exit 0
          fi
          "${ZEPHYR_BASE}/scripts/ci/guideline_check.py" --output output.txt \
            -c origin/${BASE_REF}..

      - name: check-warns
        run: |
          if [[ -s "output.txt" ]]; then
            errors=$(cat output.txt)
            errors="${errors//'%'/'%25'}"
            errors="${errors//$'\n'/'%0A'}"
            errors="${errors//$'\r'/'%0D'}"
            echo "::error file=output.txt::$errors"
            exit 1
          fi
