name: Manifest

# Disabled as a PR gate; NCS import:true manifests break action-manifest.
# Keep file for manual runs.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_PATH: .

jobs:
  manifest:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    name: Manifest
    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: app
          fetch-depth: 0
          persist-credentials: false

      - name: West setup
        env:
          BASE_REF: ${{ github.base_ref }}
        working-directory: app
        run: |
          pip install west
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          west init -l . || true

      - name: Manifest
        uses: zephyrproject-rtos/action-manifest@ce3405bd7039ea968a2821cef3b88150e9415555
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          manifest-path: 'west.yml'
          checkout-path: 'app'
          use-tree-checkout: 'true'
          check-impostor-commits: 'true'
          label-prefix: 'manifest-'
          verbosity-level: '1'
          labels: 'manifest'
          dnm-labels: 'DNM (manifest)'
          blobs-added-labels: 'Binary Blobs Added'
          blobs-modified-labels: 'Binary Blobs Modified'
