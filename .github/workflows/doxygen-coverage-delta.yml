name: Doxygen Coverage Delta Check

on:
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
    paths:
      - 'modules/**/include/**'
      - 'doc/**'
      - 'scripts/ci/doxygen_coverage_diff.py'
      - '.github/workflows/doxygen-coverage-delta.yml'

permissions:
  contents: read

env:
  BASE_REF: ${{ github.base_ref }}

jobs:
  doc-coverage-diff:
    name: Doxygen Coverage Delta Check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Rebase onto target branch
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: doc/requirements.txt

      - name: Install Python packages
        run: pip install -r doc/requirements.txt

      - name: Generate PR branch coverage JSON
        working-directory: doc
        run: |
          make doxygen-coverage-json
          cp _build/doc-coverage.json ../pr-coverage.json

      - name: Generate base branch coverage JSON
        run: |
          git worktree add --detach ../base-branch "origin/${BASE_REF}"
          echo "BASE_ROOT=$(readlink -f ../base-branch)" >> "$GITHUB_ENV"
          cd ../base-branch
          cp "${GITHUB_WORKSPACE}/doc/Doxyfile" "${GITHUB_WORKSPACE}/doc/Makefile" \
            "${GITHUB_WORKSPACE}/doc/requirements.txt" doc/
          make -C doc doxygen-coverage-json
          cp doc/_build/doc-coverage.json "${GITHUB_WORKSPACE}/base-coverage.json"

      - name: Check for undocumented new API
        run: |
          PR_ROOT=$(pwd)
          python3 scripts/ci/doxygen_coverage_diff.py \
            --reference base-coverage.json \
            --comparison pr-coverage.json \
            --strip-reference-prefix "$BASE_ROOT" \
            --strip-comparison-prefix "$PR_ROOT" \
            --summary-file "$GITHUB_STEP_SUMMARY"
