# SPDX-License-Identifier: Apache-2.0
name: NCS-CI · Coverage (report)

run-name: "NCS-CI · Coverage (report) · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}"

on:
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/codecov.yaml'
      - '.github/actions/setup-zephyr/**'

permissions:
  contents: read

jobs:
  coverage:
    name: NCS-CI · Coverage (report)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          clean: false

      - name: Setup Zephyr (cached)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "true"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Install 32-bit libs (native_sim default is -m32)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-multilib g++-multilib

      - name: Run unit tests with coverage
        run: |
          west twister -T tests/unit/nfc_apdu_asm -t ci_unit -p native_sim \
            --coverage --coverage-tool gcovr --coverage-formats xml \
            --gcov-tool gcov \
            --no-sysbuild --force-color --inline-logs -v --clobber-output \
            -j "$(nproc)"

      - name: Patch coverage of changed lines (diff-cover)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          pip install diff-cover
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          covxml="$(find twister-out -name 'coverage.xml' | head -1)"
          if [ -z "$covxml" ]; then
            echo "::warning ::no coverage.xml produced by twister"; exit 0
          fi
          echo "### Patch coverage (changed lines vs $BASE_REF)" >> "$GITHUB_STEP_SUMMARY"
          diff-cover "$covxml" --compare-branch "origin/$BASE_REF" \
            --markdown-report patch-cov.md || true
          cat patch-cov.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            **/coverage.xml
            patch-cov.md
          if-no-files-found: ignore
