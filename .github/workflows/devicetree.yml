name: Devicetree

on:
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
    paths:
      - 'boards/**'
      - 'sample.yaml'
      - 'overlay*.conf'
      - '.github/workflows/devicetree.yml'
  push:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*

permissions:
  contents: read

env:
  APP_PATH: .

jobs:
  devicetree-build:
    name: Build PN7160 overlays
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Auth for private west modules
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.auth_TOKEN }}@github.com" >> ~/.git-credentials

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: ${{ env.APP_PATH }}
          toolchains: arm-zephyr-eabi

      - name: Twister build (PN7160 DT overlays)
        run: |
          export ZEPHYR_BASE="$(west topdir)/zephyr"
          export ZEPHYR_TOOLCHAIN_VARIANT=zephyr
          west twister -T . -t pn7160 --integration --build-only \
            --force-color --inline-logs -v --clobber-output -j $(nproc)

  devicetree-status-check:
    name: Check Devicetree Status
    if: always()
    needs:
      - devicetree-build
    uses: ./.github/workflows/ready-to-merge.yml
    with:
      needs_context: ${{ toJson(needs) }}
