name: NCS-CI · Devicetree

run-name: "NCS-CI · Devicetree · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}"

on:
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
  push:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*

permissions:
  contents: read

jobs:
  changes:
    name: NCS-CI · Devicetree changes
    runs-on: ubuntu-latest
    outputs:
      dts: ${{ steps.filter.outputs.dts }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect DT-relevant changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "dts=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          changed="$(git diff --name-only "$base" HEAD || true)"
          if echo "$changed" | grep -qE '^(boards/|overlay|sample\.yaml$|\.github/workflows/devicetree\.yml$)'; then
            echo "dts=true" >> "$GITHUB_OUTPUT"
          else
            echo "dts=false" >> "$GITHUB_OUTPUT"
          fi

  devicetree-build:
    name: NCS-CI · Devicetree build
    needs: changes
    if: needs.changes.outputs.dts == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: false

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Setup Zephyr (cached)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "true"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Twister build (PN7160 DT overlays)
        run: |
          west twister -T . -t pn7160 --integration --build-only \
            --force-color --inline-logs -v --clobber-output -j $(nproc)

  devicetree-status-check:
    name: NCS-CI · Devicetree
    if: always()
    needs:
      - changes
      - devicetree-build
    uses: ./.github/workflows/ready-to-merge.yml
    with:
      needs_context: ${{ toJson(needs) }}
