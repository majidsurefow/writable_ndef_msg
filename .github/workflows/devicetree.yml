name: Devicetree

on:
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
    paths:
      - 'boards/**'
      - 'modules/**/dts/**'
      - 'sample.yaml'
      - 'overlay*.conf'
      - '.github/workflows/devicetree.yml'
  push:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*

permissions:
  contents: read

env:
  APP_PATH: .

jobs:
  devicetree-bindings:
    name: Validate DT bindings
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: ${{ env.APP_PATH }}
          toolchains: arm-zephyr-eabi

      - name: Validate binding YAML (dtschema)
        run: |
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr"
          pip install -r "${ZEPHYR_BASE}/scripts/dts/python-devicetree/requirements.txt"
          pip install dtschema
          find modules/nfc_pn7160/dts/bindings -name '*.yaml' -print0 \
            | xargs -0 -r python3 -m dtschema

  devicetree-build:
    name: Build PN7160 overlays
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: ${{ env.APP_PATH }}
          toolchains: arm-zephyr-eabi

      - name: Twister build (PN7160 DT overlays)
        run: |
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr"
          export ZEPHYR_TOOLCHAIN_VARIANT=zephyr
          west twister -T . -t pn7160 --integration --build-only \
            --force-color --inline-logs -v --clobber-output -j $(nproc)

  devicetree-status-check:
    name: Check Devicetree Status
    if: always()
    needs:
      - devicetree-bindings
      - devicetree-build
    uses: ./.github/workflows/ready-to-merge.yml
    with:
      needs_context: ${{ toJson(needs) }}
