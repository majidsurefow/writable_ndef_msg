name: Documentation Build

on:
  push:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
    tags:
      - v*
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*

permissions:
  contents: read

env:
  DOXYGEN_VERSION: 1.12.0

jobs:
  doc-file-check:
    name: Check for doc changes
    runs-on: ubuntu-24.04
    outputs:
      file_check: ${{ steps.check-doc-files.outputs.any_modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Check if documentation-related files changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: check-doc-files
        with:
          files: |
            doc/**
            modules/**/include/**
            scripts/ci/doxygen_coverage_diff.py
            .github/workflows/doc-build.yml
            .github/workflows/doxygen-coverage-delta.yml

  doc-build-html:
    name: Documentation Build (HTML)
    needs: [doc-file-check]
    if: >
      needs.doc-file-check.outputs.file_check == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: doc-build-html-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: doc/requirements.txt

      - name: Install Python packages
        run: pip install -r doc/requirements.txt

      - name: Build HTML documentation
        working-directory: doc
        run: make html

      - name: Build API coverage report
        working-directory: doc
        run: make doxygen-coverage-json

      - name: Compress documentation build artifacts
        run: |
          tar -czf html-output.tar.gz -C doc/_build/doxygen html
          cp doc/_build/doc-coverage.json api-coverage.json

      - name: Upload HTML output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html-output
          path: html-output.tar.gz

      - name: Upload API coverage JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-coverage
          path: api-coverage.json

      - name: Summarize PR documentation
        if: github.event_name == 'pull_request'
        run: |
          echo "Download the **html-output** artifact from this workflow run for API docs." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: \`tar -xzf html-output.tar.gz\` then open \`html/index.html\`." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr_num

      - name: Upload PR metadata
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr_num
          path: pr_num

  doc-build-status-check:
    name: Documentation Build Status
    if: always()
    needs:
      - doc-file-check
      - doc-build-html
    uses: ./.github/workflows/ready-to-merge.yml
    with:
      needs_context: ${{ toJson(needs) }}
