# SPDX-License-Identifier: Apache-2.0
name: NCS-CI · Twister

run-name: "NCS-CI · Twister · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}"

on:
  push:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
  pull_request:
    branches:
      - main
      - nfc-stack
      - v*-branch
      - collab-*
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  APP_PATH: .

jobs:
  twister-build-matrix:
    name: NCS-CI · Twister matrix (build)
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.config.outputs.config }}
    steps:
      - id: config
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              SCOPE=pr
              ARGS='-T . -t ci_build -p nrf54l15dk/nrf54l15/cpuapp --integration --build-only --force-color --inline-logs -v --clobber-output -j $(nproc)'
              TIMEOUT=120
              ;;
            push)
              SCOPE=push
              ARGS='-T . -t ci_build -p nrf54l15dk/nrf54l15/cpuapp --build-only --force-color --inline-logs -v --clobber-output -j $(nproc)'
              TIMEOUT=120
              ;;
            schedule)
              SCOPE=nightly
              ARGS='-T . -t ci_build --build-only --all --force-color --inline-logs -v --clobber-output -j $(nproc)'
              TIMEOUT=240
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}"
              exit 1
              ;;
          esac
          {
            echo 'config<<EOF'
            jq -cn \
              --arg scope "$SCOPE" \
              --arg args "$ARGS" \
              --argjson timeout "$TIMEOUT" \
              '{include:[{scope:$scope,twister_args:$args,timeout_minutes:$timeout}]}'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  twister-unit-matrix:
    name: NCS-CI · Twister matrix (unit)
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.config.outputs.config }}
    steps:
      - id: config
        run: |
          case "${{ github.event_name }}" in
            pull_request|push)
              SCOPE=$([ "${{ github.event_name }}" = "pull_request" ] && echo pr || echo push)
              ;;
            *)
              echo 'config={"include":[]}' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          {
            echo 'config<<EOF'
            jq -cn --arg scope "$SCOPE" '{include:[{scope:$scope}]}'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  twister-build:
    name: NCS-CI · Twister build (${{ matrix.scope }})
    needs: twister-build-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.twister-build-matrix.outputs.config) }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: false

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Setup Zephyr (cached)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "true"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Run Twister (ci_build)
        run: west twister ${{ matrix.twister_args }}

      - name: Upload Twister results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: twister-build (${{ matrix.scope }})
          if-no-files-found: ignore
          path: |
            twister-out/twister.xml
            twister-out/twister.json

  twister-unit:
    name: NCS-CI · Twister unit (${{ matrix.scope }})
    needs: twister-unit-matrix
    if: needs.twister-unit-matrix.outputs.config != '{"include":[]}'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.twister-unit-matrix.outputs.config) }}
    timeout-minutes: 60
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: false

      - name: Rebase onto target branch
        if: github.event_name == 'pull_request'
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase "origin/${BASE_REF}"
          git clean -f -d

      - name: Setup Zephyr (cached)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "true"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Install QEMU (qemu_cortex_m3)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-system-arm

      - name: Run Twister (ci_unit on qemu_cortex_m3)
        run: |
          UNIT_DIRS=(
            tests/unit/nfc_reader
            tests/unit/nfc_ultralight
            tests/unit/nfc_classic
            tests/unit/nfc_felica
            tests/unit/nfc_slix
            tests/unit/nfc_iso15693_3
            tests/unit/nfc_desfire
            tests/unit/nfc_emv
            tests/unit/nfc_aliro
            tests/unit/nfc_ndef
            tests/unit/nfc_apdu_asm
          )
          for dir in "${UNIT_DIRS[@]}"; do
            west twister -T "${dir}" -t ci_unit -p qemu_cortex_m3 \
              --no-sysbuild --force-color --inline-logs -v --clobber-output \
              -j $(nproc)
          done

      - name: Upload Twister results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: twister-unit (${{ matrix.scope }})
          if-no-files-found: ignore
          path: |
            twister-out/twister.xml
            twister-out/twister.json

  twister-test-results:
    name: NCS-CI · Twister test results
    needs:
      - twister-build
      - twister-unit
    runs-on: ubuntu-24.04
    if: always() && (needs.twister-build.result != 'skipped' || needs.twister-unit.result != 'skipped')
    permissions:
      checks: write
      contents: read
      pull-requests: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          check_name: NCS-CI · Unit Test Results
          files: "**/twister.xml"
          comment_mode: off

  twister-status-check:
    name: NCS-CI · Twister
    if: always()
    needs:
      - twister-build-matrix
      - twister-unit-matrix
      - twister-build
      - twister-unit
      - twister-test-results
    uses: ./.github/workflows/ready-to-merge.yml
    with:
      needs_context: ${{ toJson(needs) }}
