name: Compliance Checks

on:
  pull_request:
    types:
      - edited
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

env:
  APP_PATH: .
  # Product paths scanned by checkpatch/compliance (reference trees excluded)
  COMPLIANCE_PATHS: >-
    src modules boards docs sample.yaml west.yml CMakeLists.txt Kconfig prj.conf
    overlay-pn7160.conf overlay-pn7160-spi.conf license_config.yml

jobs:
  check_compliance:
    runs-on: ubuntu-24.04
    name: Run compliance checks on patch series (PR)
    steps:
      - name: Checkout the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Rebase onto the target branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          [[ "$(git rev-list --merges --count origin/${BASE_REF}..)" == "0" ]] || \
          (echo "::error ::Merge commits not allowed, rebase instead"; false)
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase origin/${BASE_REF}
          git clean -f -d

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 # v1.0.14
        with:
          app-path: ${{ env.APP_PATH }}
          toolchains: arm-zephyr-eabi

      - name: Run Compliance Tests
        continue-on-error: true
        id: compliance
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr"
          git config diff.renameLimit 10000
          excludes="-e KconfigBasic -e SysbuildKconfigBasic -e ClangFormat"
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            excludes="$excludes -e Identity"
          fi
          # Limit diff to product paths; flipperzero/, hals_temp/, aliro/ are gitignored.
          changed=$(git diff --name-only origin/${BASE_REF}.. -- ${COMPLIANCE_PATHS} || true)
          if [ -z "$changed" ]; then
            echo "No product-path changes; skipping compliance."
            echo '<?xml version="1.0"?><testsuites></testsuites>' > compliance.xml
            exit 0
          fi
          "${ZEPHYR_BASE}/scripts/ci/check_compliance.py" --annotate $excludes \
            -c origin/${BASE_REF}..

      - name: upload-results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: compliance.xml
          path: compliance.xml

      - name: check-warns
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr"
          if [[ ! -s "compliance.xml" ]]; then
            exit 1
          fi
          warns=("ClangFormat" "LicenseAndCopyrightCheck")
          files=($("${ZEPHYR_BASE}/scripts/ci/check_compliance.py" -l))
          exit=0
          for file in "${files[@]}"; do
            f="${file}.txt"
            if [[ -s $f ]]; then
              results=$(cat $f)
              results="${results//'%'/'%25'}"
              results="${results//$'\n'/'%0A'}"
              results="${results//$'\r'/'%0D'}"
              if [[ "${warns[@]}" =~ "${file}" ]]; then
                echo "::warning file=${f}::$results"
              else
                echo "::error file=${f}::$results"
                exit=1
              fi
            fi
          done
          if [ "${exit}" == "1" ]; then
            exit 1
          fi
