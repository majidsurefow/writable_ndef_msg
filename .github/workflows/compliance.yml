name: NCS-CI · Compliance

run-name: "NCS-CI · Compliance · ${{ github.event_name }} · ${{ github.head_ref || github.ref_name }}"

on:
  pull_request:
    types:
      - edited
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

env:
  COMPLIANCE_PATHS: >-
    src modules boards docs sample.yaml west.yml CMakeLists.txt Kconfig prj.conf
    overlay-pn7160.conf overlay-pn7160-spi.conf

jobs:
  check_compliance:
    runs-on: ubuntu-24.04
    name: NCS-CI · Compliance
    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          clean: false

      - name: Rebase onto the target branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config --global user.email "actions@zephyrproject.org"
          git config --global user.name "Github Actions"
          [[ "$(git rev-list --merges --count origin/${BASE_REF}..)" == "0" ]] || \
          (echo "::error ::Merge commits not allowed, rebase instead"; false)
          rm -fr ".git/rebase-apply" ".git/rebase-merge"
          git rebase origin/${BASE_REF}
          git clean -f -d

      - name: Setup Zephyr (cached, no toolchain)
        uses: ./.github/actions/setup-zephyr
        with:
          toolchain: "false"
          auth-token: ${{ secrets.auth_TOKEN }}

      - name: Run Compliance Tests
        continue-on-error: true
        id: compliance
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config diff.renameLimit 10000
          # App/NCS tree: exclude Zephyr-tree-wide Kconfig and commit-style gates
          # (this repo does not use Signed-off-by / gitlint commit bodies).
          excludes="-e KconfigBasic -e KconfigBasicNoModules -e Kconfig -e SysbuildKconfig -e SysbuildKconfigBasic -e SysbuildKconfigBasicNoModules -e Gitlint -e Identity -e ClangFormat"
          changed=$(git diff --name-only origin/${BASE_REF}.. -- ${COMPLIANCE_PATHS} || true)
          if [ -z "$changed" ]; then
            echo "No product-path changes; skipping compliance."
            echo '<?xml version="1.0"?><testsuites></testsuites>' > compliance.xml
            exit 0
          fi
          "${ZEPHYR_BASE}/scripts/ci/check_compliance.py" --annotate $excludes \
            -c origin/${BASE_REF}..

      - name: upload-results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: compliance.xml
          path: compliance.xml

      - name: check-warns
        run: |
          if [[ ! -s "compliance.xml" ]]; then
            exit 1
          fi
          warns=("ClangFormat" "LicenseAndCopyrightCheck")
          files=($("${ZEPHYR_BASE}/scripts/ci/check_compliance.py" -l))
          exit=0
          for file in "${files[@]}"; do
            f="${file}.txt"
            if [[ -s $f ]]; then
              results=$(cat $f)
              results="${results//'%'/'%25'}"
              results="${results//$'\n'/'%0A'}"
              results="${results//$'\r'/'%0D'}"
              if [[ "${warns[@]}" =~ "${file}" ]]; then
                echo "::warning file=${f}::$results"
              else
                echo "::error file=${f}::$results"
                exit=1
              fi
            fi
          done
          if [ "${exit}" == "1" ]; then
            exit 1
          fi
