# NFCT Card Emulation Only — nRF native NFCT peripheral (no PN7160).
#
# Use case: nRF54 on-die card emulation for NDEF, Ultralight, DESFire, EMV, Aliro.
# Smallest footprint CE option — no external NFC chip overhead.
# Note: NFCT is listen-only; cannot read external tags.
#
# Build:
#   west build -b nrf54l15dk/nrf54l15/cpuapp --sysbuild \
#     -- -DEXTRA_CONF_FILE=confs/nfct-ce.conf
#
# Memory baseline (nrf54l15dk): ~102 KB FLASH, ~54 KB RAM

# NFC T4T library (nrfxlib NFCT backend)
CONFIG_NFC_T4T_NRFXLIB=y

# NFC Stack — card emulation profile (implies listen stack, store, emulatable protocols)
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_NRFX=y
CONFIG_NFC_PROFILE_CARD_EMULATION=y

# Reader role must stay off (NFCT hardware limitation)
# CONFIG_NFC_ROLE_READER is not set
# CONFIG_PN7160 is not set

# APDU pool for listen path
CONFIG_NFC_APDU_BUF_SIZE=512
CONFIG_NFC_APDU_POOL_COUNT=4

# Shell
CONFIG_SHELL=y
CONFIG_DK_LIBRARY=n
