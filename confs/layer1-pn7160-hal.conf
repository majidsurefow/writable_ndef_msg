CONFIG_I2C=y
CONFIG_EMUL=y
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y
CONFIG_SHELL=n
CONFIG_NFC_STACK=n
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
