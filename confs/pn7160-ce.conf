# PN7160 Card Emulation Only — listen mode without active reader.
#
# Use case: Emulate NFC cards (NDEF, Ultralight, DESFire, EMV, Aliro).
# Does NOT include reader engine or poller protocols (Classic, FeliCa, ISO15693).
#
# Build:
#   west build -b nrf54l15dk/nrf54l15/cpuapp --sysbuild \
#     -- -DEXTRA_CONF_FILE=confs/pn7160-ce.conf \
#        -DDTC_OVERLAY_FILE=boards/overlays/pn7160_i2c.overlay
#
# Memory estimate: ~110 KB FLASH, ~50 KB RAM (no reader engine overhead)

# Hardware peripherals
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y

# PN7160 driver
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y

# NFC Stack — card emulation profile (implies listen stack, store, emulatable protocols)
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_PROFILE_CARD_EMULATION=y

# Enable listen, disable reader
CONFIG_NFC_ROLE_LISTEN=y
CONFIG_NFC_ROLE_READER=n
CONFIG_NFC_LISTEN_STACK=y
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n

# Disable poller-only protocols not needed for card emulation
CONFIG_NFC_PROTOCOL_CLASSIC=n
CONFIG_NFC_PROTOCOL_FELICA=n
CONFIG_NFC_PROTOCOL_ISO15693_3=n
CONFIG_NFC_PROTOCOL_SLIX=n

# APDU pool for listen path
CONFIG_NFC_APDU_BUF_SIZE=512
CONFIG_NFC_APDU_POOL_COUNT=4

# Shell (remove to save ~6 KB RAM)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160_SHELL=y
