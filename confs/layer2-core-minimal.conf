# Layer 2: NFC stack core minimal — reader engine + minimal store, no protocols
# Adds: Reader engine, work queues, store basics
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_EMUL=y
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_ROLE_READER=y
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_READER=y
CONFIG_NFC_STORE=y
CONFIG_NFC_STORE_RAM=y
CONFIG_NFC_STORE_RAM_SLOT_COUNT=1
CONFIG_NFC_STORE_BLOB_SIZE=2048
# Disable all protocols
CONFIG_NFC_PROTOCOL_NDEF=n
CONFIG_NFC_PROTOCOL_ULTRALIGHT=n
CONFIG_NFC_PROTOCOL_CLASSIC=n
CONFIG_NFC_PROTOCOL_FELICA=n
CONFIG_NFC_PROTOCOL_ISO15693_3=n
CONFIG_NFC_PROTOCOL_SLIX=n
CONFIG_NFC_PROTOCOL_DESFIRE=n
CONFIG_NFC_PROTOCOL_EMV=n
CONFIG_NFC_PROTOCOL_ALIRO=n
CONFIG_NFC_APPLETS=n
CONFIG_SHELL=n
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
