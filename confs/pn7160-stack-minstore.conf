# PN7160 reader stack with minimal store (1 slot, 2KB blob)
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y
CONFIG_PN7160_SHELL=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_PROFILE_READER=y
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_STORE_RAM_SLOT_COUNT=1
CONFIG_NFC_STORE_BLOB_SIZE=2048
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
