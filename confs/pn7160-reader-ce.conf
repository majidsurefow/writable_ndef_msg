# PN7160 Reader + Card Emulation — full NFC stack with both roles.
#
# Use case: Read tags AND emulate cards (not simultaneously — switch via shell).
# Includes reader engine, listen stack, all protocols, APDU pools.
#
# Build:
#   west build -b nrf54l15dk/nrf54l15/cpuapp --sysbuild \
#     -- -DEXTRA_CONF_FILE=confs/pn7160-reader-ce.conf \
#        -DDTC_OVERLAY_FILE=boards/overlays/pn7160_i2c.overlay
#
# Memory baseline (nrf54l15dk): ~131 KB FLASH, ~57 KB RAM

# Hardware peripherals
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y

# PN7160 driver
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y

# NFC Stack — reader profile as base
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_PROFILE_READER=y

# Enable listen role (adds NET_BUF + APDU pool)
CONFIG_NFC_ROLE_LISTEN=y
CONFIG_NFC_LISTEN_STACK=y
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n

# APDU pool for listen path
CONFIG_NFC_APDU_BUF_SIZE=512
CONFIG_NFC_APDU_POOL_COUNT=4

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160_SHELL=y
