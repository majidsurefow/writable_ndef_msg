# Layer 5: + Shell — L2 commands
# Adds: Shell subsystem + all NFC shell commands
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_EMUL=y
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y
CONFIG_PN7160_SHELL=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_HAL_SHELL=y
CONFIG_NFC_ROLE_READER=y
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_READER=y
CONFIG_NFC_READER_SHELL=y
CONFIG_NFC_STORE=y
CONFIG_NFC_STORE_RAM=y
CONFIG_NFC_STORE_RAM_SLOT_COUNT=4
CONFIG_NFC_STORE_BLOB_SIZE=4096
CONFIG_NFC_STORE_RAM_SHELL=y
# Enable all protocols
CONFIG_NFC_PROTOCOL_NDEF=y
CONFIG_NFC_PROTOCOL_ULTRALIGHT=y
CONFIG_NFC_PROTOCOL_CLASSIC=y
CONFIG_NFC_PROTOCOL_FELICA=y
CONFIG_NFC_PROTOCOL_ISO15693_3=y
CONFIG_NFC_PROTOCOL_SLIX=y
CONFIG_NFC_PROTOCOL_DESFIRE=y
CONFIG_NFC_PROTOCOL_EMV=y
CONFIG_NFC_PROTOCOL_ALIRO=y
# Enable applets
CONFIG_NFC_APPLETS=y
CONFIG_NFC_APPLETS_SHELL=y
# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
