# PN7160 reader stack with minimal DESFire config (1 app, 2 files, 64B)
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y
CONFIG_PN7160_SHELL=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_PROFILE_READER=y
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_DESFIRE_MAX_APPS=1
CONFIG_NFC_DESFIRE_MAX_FILES_PER_APP=2
CONFIG_NFC_DESFIRE_MAX_FILE_SIZE=64
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
