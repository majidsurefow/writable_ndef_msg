# PN7160 Reader Only — minimal tag scanning/reading without card emulation.
#
# Use case: Read NFC tags (NDEF, Ultralight, DESFire, EMV, etc.).
# Does NOT include listen stack, APDU pools, or NET_BUF overhead.
#
# Build:
#   west build -b nrf54l15dk/nrf54l15/cpuapp --sysbuild \
#     -- -DEXTRA_CONF_FILE=confs/pn7160-reader.conf \
#        -DDTC_OVERLAY_FILE=boards/overlays/pn7160_i2c.overlay
#
# Memory baseline (nrf54l15dk): ~119 KB FLASH, ~55 KB RAM

# Hardware peripherals
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y

# PN7160 driver
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_INF=y

# NFC Stack — reader profile (implies reader engine, store, protocols)
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
CONFIG_NFC_PROFILE_READER=y

# Explicitly disable listen role — saves NET_BUF + APDU pool
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n

# Shell for interactive use (remove to save ~6 KB RAM if headless)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160_SHELL=y
