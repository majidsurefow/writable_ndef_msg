description: |
  NXP PN7160 NFC controller on SPI bus.

  SPI framing (NXP source/TML/tml.c, BOARD_NXPNCI_INTERFACE_SPI):
  - Mode 0 (CPOL=0, CPHA=0), 8-bit, MSB first
  - CS active-low, held for the full transfer (single spi_transceive per segment)
  - Write: one byte 0x7F followed by the NCI/TML payload
  - Read: full-duplex with leading 0xFF dummy; discard first received byte
  - Optional 10 us delay after read segments (NXP reference)

  Default `spi-max-frequency` matches NXP examples (500 kHz); increase only after
  HIL validation.

  Example — SPI on spi21 (adjust bus, CS, and pins for your board):

      &spi21 {
          status = "okay";
          pn7160: pn7160@0 {
              compatible = "nxp,pn7160";
              reg = <0>;
              spi-max-frequency = <500000>;
              irq-gpios = <&gpio1 10 GPIO_ACTIVE_HIGH>;
              ven-gpios = <&gpio1 11 GPIO_ACTIVE_HIGH>;
          };
      };

compatible: "nxp,pn7160"

include: ["spi-device.yaml", "nxp,pn7160-common.yaml"]
