# Layered on overlay-pn7160-stack.conf (NFC_PROFILE_READER) to add the listen
# path on the same PN7160 chip — reader + card emulation in one build.
# Gate 4 product applets — top-level `nfc scan|read|emulate|verify|loop`.
# DK primitives remain: `nfc reader *`, `nfc stack *`, `nfc store *`.
# Alias (LOCKED): `nfc reader clone <slot>` == `nfc read <slot>`.
#
# DEFERRED: RW+CE on the same PN7160 chip (concurrent reader + card emulation)
# requires NXP combined-discovery sequencing — not implemented; use separate
# scan/read and emulate sessions with stack stop between them.
#
# QEMU compile check (PN7160 emul DTS required):
#   west build -b qemu_cortex_m3/ti_lm3s6965 "$REPO" --no-sysbuild \
#     -- -DEXTRA_CONF_FILE="overlay-pn7160-stack.conf;overlay-pn7160-listen.conf" \
#        -DDTC_OVERLAY_FILE="boards/overlays/pn7160_unit_test.overlay"
#
# Flip reader-only listen role back on and add the listen orchestrator. The CE
# protocol subset comes from NFC_PROFILE_READER's poller implies already.
CONFIG_NFC_ROLE_LISTEN=y
CONFIG_NFC_LISTEN_STACK=y
