# In-RAM store backend unit coverage (QEMU + native_sim).
# Lighter than the full store scenario: RAM slots + NDEF envelope only.
# 2 slots at 512 B each fit qemu_cortex_m3 (64 KiB RAM).
CONFIG_NFC_STORE_RAM=y
CONFIG_NFC_STORE_RAM_SLOT_COUNT=2
CONFIG_NFC_STORE_GOLDENS=y
CONFIG_NFC_APPLETS=n
CONFIG_NFC_STORE_BLOB_SIZE=1024
CONFIG_SHELL=n
# Clone-only heavy poller protocols — covered by the store scenario.
CONFIG_NFC_PROTOCOL_CLASSIC=n
CONFIG_NFC_PROTOCOL_FELICA=n
CONFIG_NFC_PROTOCOL_ISO15693_3=n
CONFIG_NFC_PROTOCOL_SLIX=n
