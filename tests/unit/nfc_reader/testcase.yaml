# Tier E — applet store/clone/verify (cookbook §14.6a, §14.11).

tests:
  sample.nfc.unit.nfc_reader.store:
    tags:
      - ci_unit
      - nfc
      - writable_ndef.nfc.reader
      - writable_ndef.nfc.ndef
    platform_allow:
      - qemu_cortex_m3
      - native_sim
      - native_sim/native
    integration_platforms:
      - qemu_cortex_m3
  sample.nfc.unit.nfc_reader.store_ram:
    tags:
      - ci_unit
      - nfc
      - writable_ndef.nfc.reader
      - writable_ndef.nfc.store_ram
    platform_allow:
      - qemu_cortex_m3
      - native_sim
      - native_sim/native
    integration_platforms:
      - qemu_cortex_m3
      - native_sim
    extra_args: OVERLAY_CONFIG=overlay-store-ram.conf
