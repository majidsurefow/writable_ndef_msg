# NFCT T4T listen backend (Gate 5 — emulate path, no PN7160 reader).
#
# Build (nRF54L15 target):
#   west build -b nrf54l15dk/nrf54l15/cpuapp "$REPO" --sysbuild \
#     -- -DEXTRA_CONF_FILE="$REPO/overlay-nfct-stack.conf"
#
# HIL sign-off checklist (PN7160 reader + NFCT emulate):
#   1. nfc read <slot> on PN7160 — save .card for ndef / emv / desfire / aliro
#   2. nfc emulate <slot> on NFCT (this overlay) — field on, no crash
#   3. External reader or PN7160 poll: SELECT app AID → valid SW / payload
#   4. nfc verify <slot> on PN7160 — PASS vs stored blob
#   5. Stats: apdu_assembled_count > 0; apdu_dropped_no_consumer == 0
#
# QEMU cannot exercise nrfx NFCT ISR path — use unit virtual loopback for listeners.
CONFIG_NFC_T4T_NRFXLIB=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_NRFX=y
CONFIG_NFC_ROLE_LISTEN=y
CONFIG_NFC_LISTEN_STACK=y
CONFIG_NFC_LISTEN_STACK_SHELL=y
CONFIG_NFC_PROTOCOL_NDEF=y
CONFIG_NFC_PROTOCOL_DESFIRE=y
CONFIG_NFC_PROTOCOL_EMV=y
CONFIG_NFC_PROTOCOL_ALIRO=y
CONFIG_NFC_STORE=y
CONFIG_NFC_STORE_RAM=y
CONFIG_NFC_APPLETS=y
CONFIG_NFC_APPLETS_SHELL=y
CONFIG_NFC_ROUTER_MAX_AIDS=8
# CONFIG_NFC_ROLE_READER is not set
# CONFIG_PN7160 is not set
CONFIG_NFC_HAL_SHELL=y
CONFIG_SHELL=y
