# PN7160 + NFC stack (Gate 0 reader scaffold)
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_EMUL=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_DBG=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160_SHELL=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
# CONFIG_NFC_HAL_BACKEND_NRFX is not set
CONFIG_NFC_ROLE_READER=y
CONFIG_NFC_READER=y
CONFIG_NFC_READER_SHELL=y
CONFIG_NFC_PROTOCOL_NDEF=y
CONFIG_NFC_STORE=y
CONFIG_NFC_APPLETS=y
CONFIG_NFC_APPLETS_SHELL=y
# Gate 2 reader-only on PN7160 (listen + stack orchestrator in Gate 3 overlay)
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
CONFIG_CRC=y
