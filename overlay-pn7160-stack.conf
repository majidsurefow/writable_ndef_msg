# PN7160 + NFC stack — reader product (Gate 0 reader scaffold)
#
# Requires a PN7160 devicetree node — pair with a board overlay, e.g.:
#   west build -b nrf54l15dk/nrf54l15/cpuapp . \
#     -DEXTRA_CONF_FILE=overlay-pn7160-stack.conf
# (sysbuild.cmake defaults writable_ndef_msg_DTC_OVERLAY_FILE to pn7160_i2c.overlay)
# Or explicitly:
#   -Dwritable_ndef_msg_DTC_OVERLAY_FILE=boards/overlays/pn7160_i2c.overlay
#
# Driver UART/shell defaults from overlay-pn7160.conf are merged below.
# NFC logic reduced to one profile line: NFC_PROFILE_READER implies the reader
# engine, RAM store, applets, and all poller protocols (imply, overridable).
CONFIG_I2C=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_GPIO=y
CONFIG_EMUL=y
CONFIG_PN7160=y
CONFIG_PN7160_LOG_LEVEL_DBG=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PN7160_SHELL=y
CONFIG_NFC_STACK=y
CONFIG_NFC_HAL_BACKEND_PN7160=y
# CONFIG_NFC_HAL_BACKEND_NRFX is not set
CONFIG_NFC_PROFILE_READER=y
# Gate 2 reader-only on PN7160 — keep listen role off (no NET_BUF/APDU pool).
# Add listen + stack orchestrator via overlay-pn7160-listen.conf.
CONFIG_NFC_ROLE_LISTEN=n
CONFIG_NFC_T4T_NRFXLIB=n
CONFIG_DK_LIBRARY=n
# CRC is selected by NFC_STORE (store envelope checksum) — no overlay line needed.
